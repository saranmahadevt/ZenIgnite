name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed for gh-deploy to push to gh-pages branch

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the full repository (fetch-depth=0 gives git history for
      #    the "git revision date" plugin if added later)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      # 3. Install MkDocs Material and extensions
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mkdocs-material \
            pymdown-extensions

      # 4. Build the site to catch any errors early
      - name: Build docs
        run: mkdocs build --strict --verbose

      # 5. Deploy to the gh-pages branch (creates/overwrites the branch)
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
