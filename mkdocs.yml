site_name: ZenIgnite — Git Collaboration Training
site_description: Hands-on Git training repository — master Git workflows by building a real Todo CLI application.
site_author: ZenIgnite
repo_url: https://github.com/saranmahadevt/ZenIgnite
repo_name: ZenIgnite
edit_uri: edit/main/

docs_dir: docs
site_dir: _site

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/ZenIgnite

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Git Cheatsheet: git-commands-cheatsheet.md
  - Exercises:
      - Git Exercises: exercises/git-exercises.md
      - Conflict Resolution: exercises/conflict-resolution.md
  - Workflows:
      - Three-Person:
          - Overview: workflows/three-person/README.md
          - Roles: workflows/three-person/roles.md
          - "Phase 1 — DB Setup": workflows/three-person/phase-1-setup-db.md
          - "Phase 2 — CRUD": workflows/three-person/phase-2-crud.md
          - "Phase 3 — Interface & Testing": workflows/three-person/phase-3-interface-testing.md
      - Four-Person:
          - Overview: workflows/four-person/README.md
          - Roles: workflows/four-person/roles.md
          - "Phase 1 — DB Setup": workflows/four-person/phase-1-setup-db.md
          - "Phase 2 — Backend": workflows/four-person/phase-2-backend.md
          - "Phase 3 — Interface": workflows/four-person/phase-3-interface.md
          - "Phase 4 — QA & Release": workflows/four-person/phase-4-qa-release.md
  - Todo App: todo-app/README.md
  - Solutions: solution/README.md
